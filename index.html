<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
         What is my favorite Album?
        <select id="movie-answer">
          <option value="movie1">PND 4</option>
          <option value="movie2">MASTER</option>
          <option value="movie3">CTRL</option>
          <option value="movie4">Sweetener</option>
        </select>
      </label>
      <button type="submit">Check Your Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img id="rightanswer" src="">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        🎧 What is my favorite Artist?
        <select id="book-answer">
          <option value="book1">SZA</option>
          <option value="book2">Mariah the Scientist</option>
          <option value="book3">Summer Walker</option>
          <option value="book4">Jhene Aiko</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
      <img id="goodanswer" src="">
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YESSSS!");
          $("#rightanswer"). attr("src","https://upload.wikimedia.org/wikipedia/en/7/7a/Sweetener_album_cover.png")
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
          $("#goodanswer"). attr("src","https://imgix.bustle.com/uploads/getty/2024/6/24/f0baaea0/sza-accepts-the-song.jpg?w=1200&h=900&fit=crop&crop=focalpoint&fm=jpg&fp-x=0.4565&fp-y=0.1936"
          )
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
